services:
  config-hub:
    build: .
    container_name: config-hub
    ports:
      - "1323:1323"
    volumes:
      - ./data:/data
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:1323/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
